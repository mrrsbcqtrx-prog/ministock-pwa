<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - MiniStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-arrow-left"></i> Volver</a>
      <span class="navbar-text text-white">Productos</span>
      <button class="btn btn-light" onclick="signOut()">Salir</button>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="table-responsive">
      <table class="table table-striped" id="tabla-productos">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Código</th>
            <th>P. Costo</th>
            <th>P. Venta</th>
            <th>Stock</th>
            <th>Stock Mín.</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    checkAuth().then(user => {
      if (!user) return;
      cargarProductos();
    });

    async function cargarProductos() {
      const { data, error } = await supabase
        .from('productos')
        .select('*')
        .order('nombre');
      const tbody = document.querySelector('#tabla-productos tbody');
      if (error) {
        tbody.innerHTML = `<tr><td colspan="7">Error al cargar</td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(p => `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.codigo_barras || '-'}</td>
          <td>$${p.precio_costo}</td>
          <td>$${p.precio_venta}</td>
          <td>${p.stock_actual}</td>
          <td>${p.stock_minimo}</td>
          <td><button class="btn btn-sm btn-danger" onclick="eliminarProducto('${p.id}')"><i class="bi bi-trash"></i></button></td>
        </tr>
      `).join('');
    }

    async function eliminarProducto(id) {
      if (!confirm('¿Eliminar producto? También se borrarán sus movimientos.')) return;
      const { error } = await supabase.from('productos').delete().eq('id', id);
      if (error) alert('Error al eliminar');
      else cargarProductos();
    }
  </script>
</body>
</html>
