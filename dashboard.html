<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - MiniStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-shop-window"></i> MiniStock</a>
      <button class="btn btn-light" onclick="signOut()"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </nav>

  <div class="container mt-4">
    <h1>Panel de Control</h1>
    <div class="row mt-3" id="dashboard-cards">
      <div class="col-12">Cargando...</div>
    </div>
    <hr>
    <div class="row mt-3">
      <div class="col-md-6 mb-3">
        <a href="productos.html" class="btn btn-outline-primary w-100 p-3"><i class="bi bi-box-seam"></i> Ver Productos</a>
      </div>
      <div class="col-md-6 mb-3">
        <a href="agregar_producto.html" class="btn btn-outline-success w-100 p-3"><i class="bi bi-plus-circle"></i> Nuevo Producto</a>
      </div>
      <div class="col-md-6 mb-3">
        <a href="movimiento.html" class="btn btn-outline-warning w-100 p-3"><i class="bi bi-arrow-left-right"></i> Registrar Movimiento</a>
      </div>
      <div class="col-md-6 mb-3">
        <a href="alertas.html" class="btn btn-outline-danger w-100 p-3"><i class="bi bi-exclamation-triangle"></i> Alertas Stock Bajo</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    checkAuth().then(user => {
      if (!user) return;
      cargarDashboard();
    });

    async function cargarDashboard() {
      // Total productos
      const { count: totalProductos, error: errorCount } = await supabase
        .from('productos')
        .select('*', { count: 'exact', head: true });
      
      // Productos con stock bajo (cargamos todos y filtramos en JS, para simplificar)
      const { data: todosProductos } = await supabase
        .from('productos')
        .select('stock_actual, stock_minimo');
      const totalBajoStock = todosProductos ? todosProductos.filter(p => p.stock_actual < p.stock_minimo).length : 0;

      document.getElementById('dashboard-cards').innerHTML = `
        <div class="col-md-6 mb-3">
          <div class="card text-white bg-info">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-box-seam"></i> Total Productos</h5>
              <p class="display-4">${totalProductos || 0}</p>
            </div>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <div class="card text-white bg-danger">
            <div class="card-body">
              <h5 class="card-title"><i class="bi bi-exclamation-triangle-fill"></i> Stock Bajo</h5>
              <p class="display-4">${totalBajoStock}</p>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
