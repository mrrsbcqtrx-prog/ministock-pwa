<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas - MiniStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-arrow-left"></i> Volver</a>
      <span class="navbar-text text-white">Alertas de Stock</span>
    </div>
  </nav>

  <div class="container mt-4">
    <h3>Productos con Bajo Stock</h3>
    <div class="table-responsive">
      <table class="table table-striped" id="tabla-alertas">
        <thead><tr><th>Nombre</th><th>Stock Actual</th><th>Stock Mínimo</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    checkAuth().then(user => {
      if (!user) return;
      cargarAlertas();
    });

    async function cargarAlertas() {
      const { data, error } = await supabase
        .from('productos')
        .select('nombre, stock_actual, stock_minimo')
        .filter('stock_actual', 'lt', supabase.raw('stock_minimo')) // raw no existe, filtramos manual
        .order('nombre');
      // Como el filtro columna vs columna no es soportado directamente, traemos todos y filtramos
      const { data: todos } = await supabase.from('productos').select('nombre, stock_actual, stock_minimo');
      const filtrados = todos ? todos.filter(p => p.stock_actual < p.stock_minimo) : [];
      const tbody = document.querySelector('#tabla-alertas tbody');
      tbody.innerHTML = filtrados.map(p => `
        <tr>
          <td>${p.nombre}</td>
          <td>${p.stock_actual}</td>
          <td>${p.stock_minimo}</td>
        </tr>
      `).join('') || '<tr><td colspan="3">Ningún producto en alerta</td></tr>';
    }
  </script>
</body>
</html>
