<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Producto - MiniStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-arrow-left"></i> Volver</a>
      <span class="navbar-text text-white">Nuevo Producto</span>
    </div>
  </nav>

  <div class="container mt-4">
    <form id="form-producto">
      <div class="mb-3">
        <label class="form-label">Nombre *</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Código de barras</label>
        <input type="text" class="form-control" id="codigo_barras">
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Precio Costo *</label>
          <input type="number" class="form-control" id="precio_costo" step="0.01" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Precio Venta *</label>
          <input type="number" class="form-control" id="precio_venta" step="0.01" required>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Stock Inicial *</label>
          <input type="number" class="form-control" id="stock_inicial" value="0" required>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label">Stock Mínimo</label>
          <input type="number" class="form-control" id="stock_minimo" value="5">
        </div>
      </div>
      <button type="submit" class="btn btn-success">Guardar Producto</button>
    </form>
    <div id="mensaje" class="mt-3"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    checkAuth();
    document.getElementById('form-producto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const producto = {
        nombre: document.getElementById('nombre').value,
        codigo_barras: document.getElementById('codigo_barras').value || null,
        precio_costo: parseFloat(document.getElementById('precio_costo').value),
        precio_venta: parseFloat(document.getElementById('precio_venta').value),
        stock_actual: parseInt(document.getElementById('stock_inicial').value),
        stock_minimo: parseInt(document.getElementById('stock_minimo').value)
      };
      const { data, error } = await supabase.from('productos').insert(producto).select();
      const msg = document.getElementById('mensaje');
      if (error) {
        msg.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      } else {
        // Registrar movimiento de entrada por el stock inicial
        if (producto.stock_actual > 0) {
          await supabase.from('movimientos').insert({
            producto_id: data[0].id,
            tipo: 'entrada',
            cantidad: producto.stock_actual
          });
        }
        msg.innerHTML = `<div class="alert alert-success">Producto creado correctamente.</div>`;
        document.getElementById('form-producto').reset();
      }
    });
  </script>
</body>
</html>
