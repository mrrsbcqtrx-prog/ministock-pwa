<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimiento - MiniStock</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-arrow-left"></i> Volver</a>
      <span class="navbar-text text-white">Registrar Movimiento</span>
    </div>
  </nav>

  <div class="container mt-4">
    <form id="form-movimiento">
      <div class="mb-3">
        <label class="form-label">Producto *</label>
        <select class="form-select" id="producto_id" required></select>
      </div>
      <div class="mb-3">
        <label class="form-label">Tipo *</label>
        <select class="form-select" id="tipo" required>
          <option value="entrada">Entrada (Compra)</option>
          <option value="salida">Salida (Venta)</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Cantidad *</label>
        <input type="number" class="form-control" id="cantidad" min="1" required>
      </div>
      <button type="submit" class="btn btn-warning">Registrar Movimiento</button>
    </form>
    <div id="mensaje" class="mt-3"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    checkAuth();
    async function cargarProductos() {
      const { data } = await supabase.from('productos').select('id, nombre, stock_actual');
      const select = document.getElementById('producto_id');
      select.innerHTML = data.map(p => `<option value="${p.id}">${p.nombre} (Stock: ${p.stock_actual})</option>`).join('');
    }
    cargarProductos();

    document.getElementById('form-movimiento').addEventListener('submit', async (e) => {
      e.preventDefault();
      const producto_id = document.getElementById('producto_id').value;
      const tipo = document.getElementById('tipo').value;
      const cantidad = parseInt(document.getElementById('cantidad').value);
      
      // Validar stock para salida
      if (tipo === 'salida') {
        const { data: prod } = await supabase.from('productos').select('stock_actual').eq('id', producto_id).single();
        if (prod.stock_actual < cantidad) {
          document.getElementById('mensaje').innerHTML = `<div class="alert alert-danger">Stock insuficiente (actual: ${prod.stock_actual})</div>`;
          return;
        }
      }
      
      // Insertar movimiento
      const { error: errorMov } = await supabase.from('movimientos').insert({ producto_id, tipo, cantidad });
      if (errorMov) {
        document.getElementById('mensaje').innerHTML = `<div class="alert alert-danger">Error: ${errorMov.message}</div>`;
        return;
      }
      
      // Actualizar stock del producto
      const operador = tipo === 'entrada' ? '+' : '-';
      const { error: errorUpd } = await supabase.rpc('actualizar_stock', { prod_id: producto_id, cant: cantidad, oper: operador });
      // Como no tenemos función RPC, haremos la actualización manual (alternativa)
      // Obtenemos stock actual y actualizamos
      const { data: productoData } = await supabase.from('productos').select('stock_actual').eq('id', producto_id).single();
      const nuevoStock = tipo === 'entrada' ? productoData.stock_actual + cantidad : productoData.stock_actual - cantidad;
      const { error: errorUpdStock } = await supabase.from('productos').update({ stock_actual: nuevoStock }).eq('id', producto_id);
      
      if (errorUpdStock) {
        document.getElementById('mensaje').innerHTML = `<div class="alert alert-warning">Movimiento registrado pero no se pudo actualizar stock. Contacta soporte.</div>`;
      } else {
        document.getElementById('mensaje').innerHTML = `<div class="alert alert-success">Movimiento registrado. Stock actualizado.</div>`;
        document.getElementById('cantidad').value = 1;
        cargarProductos(); // refrescar lista
      }
    });
  </script>
</body>
</html>
